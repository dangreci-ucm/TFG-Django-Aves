<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" type="text/css" media="screen" href="/css/same.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="icon" type="image/png" href="/img/favicon_ave.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width">
  <meta charset="UTF-8">
  <title>Subir dataset - TFG</title>

  <!-- Carga solo una vez -->
  <script defer src="/js/nav.js"></script>
</head>

<body>

  <header>
    <h1>Identificación de Restos Óseos en Rapaces Emblemáticas</h1>
  </header>

  <div id="site-navbar-placeholder"></div>

  <div class="text">
    <div class="description">

      <h1>Subir dataset (Excel)</h1>
      <p>Solo usuarios con sesión iniciada pueden subir un archivo.</p>

      <div id="authWarning" style="display:none;">
        <p>No has iniciado sesión. Te redirigimos a login…</p>
      </div>

      <form id="uploadForm" style="display:none; padding: 1em;">
        <input type="file" id="fileInput" accept=".xlsx,.xls" required />
        <button type="submit">Subir</button>
      </form>
      
      <div style="margin: 1em 0; padding: 1em; background-color: rgba(29,71,121,.04);">
      <p>Puedes descargar el dataset actual, editarlo y volver a subirlo.</p>
      <a href="/api/dataset/download" style="display:inline-block; margin-top:0.5em;">
        Descargar dataset actual (Excel)
      </a>
      </div>

      <p id="status"></p>

    </div>
  </div>

  <script>
    async function getCSRFToken() {
      const cookie = document.cookie
        .split("; ")
        .find((row) => row.startsWith("csrftoken="));
      return cookie ? cookie.split("=")[1] : null;
    }

    async function checkAuthOrRedirect() {
      const res = await fetch("/api/me", { credentials: "include" });
      const data = await res.json();

      if (!data.authenticated) {
        document.getElementById("authWarning").style.display = "block";
        const next = encodeURIComponent("/upload.html");
        window.location.href = `/accounts/login/?next=${next}`;
        return;
      }

      document.getElementById("uploadForm").style.display = "block";
    }

    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const status = document.getElementById("status");
      const file = document.getElementById("fileInput").files[0];
      if (!file) {
        status.textContent = "Selecciona un archivo.";
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      const csrftoken = await getCSRFToken();
      if (!csrftoken) {
        status.textContent = "No se encontró CSRF token. Inicia sesión y recarga.";
        return;
      }

      status.textContent = "Subiendo…";

      try {
        const res = await fetch("/api/dataset/upload", {
          method: "POST",
          credentials: "include",
          headers: { "X-CSRFToken": csrftoken },
          body: formData,
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          status.textContent = data.message || "Subida completada.";
        } else if (res.status === 401 || res.status === 403) {
          status.textContent = "Sesión no válida. Redirigiendo a login…";
          const next = encodeURIComponent("/upload.html");
          window.location.href = `/accounts/login/?next=${next}`;
        } else {
          status.textContent = data.error || "Error al subir el archivo.";
        }
      } catch (err) {
        status.textContent = "Error de conexión.";
      }
    });

    checkAuthOrRedirect();
  </script>

</body>
</html>
