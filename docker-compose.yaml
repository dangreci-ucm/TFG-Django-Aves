version: '3.8'

services:
  database:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: tfg_db
      POSTGRES_USER: tfg_user
      POSTGRES_PASSWORD: "123"
    volumes:
      - ./db:/var/lib/postgresql/data
      - ./logs:/var/log/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tfg_user -d tfg_db"]
      interval: 2s
      timeout: 3s
      retries: 30

  web:
    build: .
    container_name: django_backend
    command: >
      sh -c "
      until python -c \"import psycopg2; psycopg2.connect(host='database', dbname='tfg_db', user='tfg_user', password='123')\"; do
        echo 'Esperando a Postgres.';
        sleep 2;
      done;
      python manage.py migrate &&
      exec gunicorn mysite.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 120 --log-level info
      "
    expose:
      - "8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_SECRET_KEY: "dev-secret"
      DATABASE_NAME: "tfg_db"
      DATABASE_USER: "tfg_user"
      DATABASE_PASSWORD: "123"
      DATABASE_HOST: "database"
      MODEL_PATH: "/app/model_store/latest_model.joblib"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - .:/app
      - ./model_store:/app/model_store

  nginx:
    image: nginx:alpine
    container_name: nginx_frontend
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
