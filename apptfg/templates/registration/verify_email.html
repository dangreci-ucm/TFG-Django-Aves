<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="/css/same.css">
  <link rel="icon" type="image/png" href="/img/favicon_ave.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width">
  <meta charset="UTF-8">
  <title>Verificar correo - TFG</title>
  <script defer src="/js/nav.js"></script>
</head>
<body>

<header>
  <h1>Identificación de Restos Óseos en Rapaces Emblemáticas</h1>
</header>

<div id="site-navbar-placeholder"></div>

<div class="text">
  <div class="description">
    <h1>Verificar correo</h1>

    {% if messages %}
      {% for message in messages %}
        <p>{{ message }}</p>
      {% endfor %}
    {% endif %}

    <form method="post" style="padding:1em;">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Verificar</button>
    </form>
  </div>
</div>

</body>
</html>
